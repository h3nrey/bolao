<div class="flex flex-col items-center text-center mb-8">
  <span class="inline-flex px-4 py-1.5 bg-gradient-to-r from-red-600/10 to-amber-500/10 border border-red-500/20 rounded-full text-xs font-semibold tracking-wider text-amber-400 uppercase mb-4">
    World Cup 2026
  </span>
  <h1 class="font-black text-4xl text-transparent bg-clip-text bg-gradient-to-r from-white via-red-200 to-red-500 tracking-tight leading-none mb-3">
    Bolão Copa
  </h1>
  <p class="text-sm text-slate-400 leading-relaxed">
    Acompanhe, dê palpites e lidere o ranking oficial do campeonato mundial.
  </p>
</div>

<!-- Google Sign In -->
<div class="w-full mb-6">
  <button (click)="onGoogleLogin()" class="w-full py-3.5 px-5 bg-white text-slate-950 font-bold border-none rounded-xl cursor-pointer flex items-center justify-center gap-3 shadow-lg hover:bg-slate-100 hover:scale-[1.01] transition-all duration-200">
    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
    </svg>
    Entrar com o Google
  </button>
</div>

<!-- Divider -->
<div class="flex items-center text-center text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6 w-full before:content-[''] before:flex-1 before:border-b before:border-white/5 before:mr-4 after:content-[''] after:flex-1 after:border-b after:border-white/5 after:ml-4">
  ou insira seu token
</div>

<!-- Token Field -->
<div class="flex flex-col gap-2 w-full text-left">
  <label for="jwt-token" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Token JWT do Usuário</label>
  <div class="w-full">
    <input 
      type="text" 
      id="jwt-token" 
      placeholder="Cole o token retornado pelo Google Callback..." 
      class="w-full py-3.5 px-4 bg-white/2 border border-white/10 rounded-xl text-white text-xs outline-none focus:border-red-500 focus:shadow-[0_0_12px_rgba(239,68,68,0.2)] focus:bg-white/5 transition-all duration-200" 
      [ngModel]="token()"
      (ngModelChange)="token.set($event)"
      [disabled]="loading()"
    />
  </div>

  @if (error()) {
    <div class="w-full py-3 px-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs mt-3 leading-relaxed">
      {{ error() }}
    </div>
  }

  @if (loading()) {
    <div class="flex justify-center items-center py-4 mt-3">
      <div class="w-7 h-7 border-3 border-white/10 border-t-red-500 rounded-full animate-spin"></div>
    </div>
  } @else {
    <button 
      (click)="onConnectToken()" 
      class="w-full mt-4 py-3.5 px-5 bg-gradient-to-r from-red-600 to-red-800 text-white font-bold border-none rounded-xl cursor-pointer shadow-lg shadow-red-950/20 hover:scale-[1.01] hover:shadow-red-900/30 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100 disabled:shadow-none" 
      [disabled]="!token().trim()"
    >
      Conectar Token
    </button>
  }
</div>
