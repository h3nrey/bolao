<div class="flex flex-col gap-6 w-full animate-fadeIn">

  <!-- Header Row matching mockup -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-white/5 pb-6">
    <div class="flex flex-col text-left">
      <h1 class="text-3xl font-extrabold text-white tracking-tight leading-none mb-2">
        Classificação
      </h1>
      <p class="text-xs text-slate-400 font-medium">Batalhe pelo topo na comunidade do Bolão Vlab.</p>
    </div>

    <!-- Sub-tabs and Dropdown -->
    <div class="flex flex-wrap items-center gap-3">

      <!-- Dropdown Mimic -->
      <div class="relative">
        <button
          class="bg-[#1c2230] hover:bg-[#232a3c] border border-white/5 px-4 py-2 text-xs font-semibold rounded-xl text-white flex items-center gap-2 cursor-pointer transition-all duration-200 select-none">
          Série Ouro
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading state -->
  @if (loadingRankings()) {
  <div class="flex flex-col items-center justify-center py-20 gap-3 w-full">
    <div class="w-10 h-10 border-3 border-white/5 border-t-red-500 rounded-full animate-spin"></div>
    <p class="text-xs text-slate-400">Carregando classificação...</p>
  </div>
  } @else {
  @if (rankings().length === 0) {
  <div class="py-16 px-6 text-center text-slate-400 border border-dashed border-white/10 rounded-2xl bg-slate-900/10">
    <svg class="w-12 h-12 text-slate-500 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <p class="text-sm font-semibold">Nenhuma classificação encontrada para este torneio ainda.</p>
    <p class="text-xs text-slate-500 mt-1">Os rankings serão computados assim que as partidas começarem.</p>
  </div>
  } @else {

  <!-- Leaderboard Table Component -->
  <app-leaderboard-table [rankings]="rankings()" [userId]="userId()" />

  <!-- Bottom Legend & Countdown Component -->
  <app-ranking-legend countdown="4 dias, 12:45:00" />

  }
  }
</div>
