<aside class="h-full w-64 bg-[#0d1321] border-r border-white/5 flex flex-col justify-between shrink-0 p-6">
  <div class="flex flex-col">
    <!-- Logo/Brand Component -->
    <div class="mb-8">
      <app-logo></app-logo>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex flex-col gap-2">
      <app-sidebar-item 
        (click)="navigate('/ranking')" 
        [active]="isActive('/ranking')" 
        label="Classificação"
      >
        <svg lucideTrophy class="w-5 h-5"></svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="navigate('/participantes')" 
        [active]="isActive('/participantes')" 
        label="Participantes"
      >
        <svg lucideUsers class="w-5 h-5"></svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="navigate('/partidas')" 
        [active]="isActive('/partidas')" 
        label="Partidas"
      >
        <svg lucideCalendar class="w-5 h-5"></svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="navigate('/cartela')" 
        [active]="isActive('/cartela')" 
        label="Palpitar"
      >
        <svg lucideClipboardList class="w-5 h-5"></svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="navigate('/regras')" 
        [active]="isActive('/regras')" 
        label="Regras"
      >
        <svg lucideFileText class="w-5 h-5"></svg>
      </app-sidebar-item>
    </nav>
  </div>

  <!-- Reusable User Profile Footer Atom -->
  <app-user-profile-footer 
    [user]="user()" 
    (logoutRequested)="onLogout()"
    (profileRequested)="navigate('/perfil')"
  ></app-user-profile-footer>
</aside>
