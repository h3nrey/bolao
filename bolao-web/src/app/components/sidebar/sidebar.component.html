<aside class="h-full w-64 bg-[#0d1321] border-r border-white/5 flex flex-col justify-between shrink-0 p-6">
  <div class="flex flex-col">
    <!-- Logo/Brand Component -->
    <div class="mb-8">
      <app-logo></app-logo>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex flex-col gap-2">
      <app-sidebar-item 
        (click)="selectTab('leaderboard')" 
        [active]="activeTab() === 'leaderboard'" 
        label="Classificação"
      >
        <!-- Trophy SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12a7.5 7.5 0 00-15 0c0 1.5.3 2.925.85 4.25a6.002 6.002 0 0010.3 0c.55-1.325.85-2.75.85-4.25z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75v-1.5m0 3V18.75m-3.75 3h7.5" />
        </svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="selectTab('participants')" 
        [active]="activeTab() === 'participants'" 
        label="Participantes"
      >
        <!-- Users SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 21c-2.243 0-4.352-.648-6.124-1.772.381-1.074 1.258-1.89 2.377-2.193a10.94 10.94 0 0111.458 0c1.119.303 1.996 1.119 2.377 2.193M12 7a3 3 0 11-6 0 3 3 0 016 0zm7.136 6a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0z" />
        </svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="selectTab('matches')" 
        [active]="activeTab() === 'matches'" 
        label="Partidas"
      >
        <!-- Calendar/Match SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="selectTab('betsheet')" 
        [active]="activeTab() === 'betsheet'" 
        label="Palpitar"
      >
        <!-- Clipboard/Predictions SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="selectTab('rules')" 
        [active]="activeTab() === 'rules'" 
        label="Regras"
      >
        <!-- Clipboard/Rules SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
        </svg>
      </app-sidebar-item>

      <app-sidebar-item 
        (click)="selectTab('profile')" 
        [active]="activeTab() === 'profile'" 
        label="Perfil"
      >
        <!-- User Profile SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </app-sidebar-item>
    </nav>
  </div>

  <!-- Reusable User Profile Footer Atom -->
  <app-user-profile-footer 
    [user]="user()" 
    (logoutRequested)="onLogout()"
  ></app-user-profile-footer>
</aside>
