<div class="flex items-center justify-between hover:bg-white/10 rounded-xl flex items-center py-2">
  <div (click)="profileRequested.emit()"
    class="flex items-center gap-3 overflow-hidden cursor-pointer hover:opacity-85 active:scale-95 transition-all select-none">
    @if (user()?.avatar_url) {
    <img [src]="user()?.avatar_url" alt="Avatar"
      class="w-10 h-10 rounded-full object-cover border border-white/10 shrink-0 shadow-sm" />
    } @else {
    <div
      class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-red-800 text-white flex items-center justify-center font-bold border border-white/10 shrink-0 shadow-sm">
      {{ user()?.name?.charAt(0)?.toUpperCase() }}
    </div>
    }
    <div class="flex flex-col text-left overflow-hidden">
      <span class="text-xs font-bold text-white truncate">{{ user()?.name }}</span>
    </div>
  </div>

  <!-- Logout Button Icon -->
  <button (click)="onLogout()" title="Sair"
    class="p-2 hover:bg-red-500/10 hover:text-red-500 text-slate-400 rounded-xl cursor-pointer transition-all duration-200 border-none bg-transparent">
    <svg lucideLogOut class="w-5 h-5"></svg>
  </button>
</div>
