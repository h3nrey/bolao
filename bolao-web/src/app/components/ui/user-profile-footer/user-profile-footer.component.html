<div class="flex items-center justify-between border-t border-white/5 pt-4">
  <div class="flex items-center gap-3 overflow-hidden">
    @if (user()?.avatar_url) {
      <img [src]="user()?.avatar_url" alt="Avatar" class="w-10 h-10 rounded-full object-cover border border-white/10 shrink-0 shadow-sm" />
    } @else {
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-red-800 text-white flex items-center justify-center font-bold border border-white/10 shrink-0 shadow-sm">
        {{ user()?.name?.charAt(0)?.toUpperCase() }}
      </div>
    }
    <div class="flex flex-col text-left overflow-hidden">
      <span class="text-xs font-bold text-white truncate">{{ user()?.name }}</span>
      <span class="text-[9px] font-semibold text-amber-500 uppercase tracking-wider">Série Ouro</span>
    </div>
  </div>
  
  <!-- Logout Button Icon -->
  <button 
    (click)="onLogout()" 
    title="Sair"
    class="p-2 hover:bg-red-500/10 hover:text-red-500 text-slate-400 rounded-xl cursor-pointer transition-all duration-200 border-none bg-transparent"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
    </svg>
  </button>
</div>
