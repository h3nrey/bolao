<div class="flex items-center gap-3 text-xs font-bold text-emerald-400 select-none">
  <button 
    (click)="prev.emit()"
    [disabled]="!hasPrevRound()"
    class="text-slate-500 hover:text-emerald-400 disabled:text-slate-800 disabled:hover:text-slate-800 transition-all cursor-pointer disabled:cursor-not-allowed bg-transparent border-none py-1 px-2 text-sm font-black flex items-center justify-center"
  >
    &lt;
  </button>
  <span class="tracking-wider uppercase text-xs md:text-sm font-black w-24 text-center text-emerald-400">
    {{ activeRoundLabel() }}
  </span>
  <button 
    (click)="next.emit()"
    [disabled]="!hasNextRound()"
    class="text-slate-500 hover:text-emerald-400 disabled:text-slate-800 disabled:hover:text-slate-800 transition-all cursor-pointer disabled:cursor-not-allowed bg-transparent border-none py-1 px-2 text-sm font-black flex items-center justify-center"
  >
    &gt;
  </button>
</div>
