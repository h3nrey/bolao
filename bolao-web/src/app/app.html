@if (user()) {
  <!-- Full Screen Premium Dashboard Layout -->
  <div class="h-screen w-full flex bg-[#090d16] text-slate-100 font-sans overflow-hidden">
    
    <!-- Left Sidebar Component -->
    <app-sidebar 
      [activeTab]="activeTab()" 
      [user]="user()" 
      (tabSelected)="activeTab.set($event)" 
      (logoutRequested)="logout()"
    ></app-sidebar>

    <!-- Main Content Pane -->
    <main class="flex-1 overflow-y-auto p-8 bg-[#090d16] flex flex-col">
      <!-- Dynamic Pages wrapper -->
      <div class="max-w-6xl w-full mx-auto">
        @if (activeTab() === 'leaderboard') {
          <app-ranking [token]="token()" [userId]="user()?.id"></app-ranking>
        }

        @if (activeTab() === 'matches') {
          <app-partidas [token]="token()"></app-partidas>
        }

        @if (activeTab() === 'betsheet') {
          <app-cartela [token]="token()"></app-cartela>
        }

        @if (activeTab() === 'rules') {
          <app-regras></app-regras>
        }

        @if (activeTab() === 'profile') {
          <app-perfil [user]="user()" (logoutRequested)="logout()"></app-perfil>
        }
      </div>
    </main>
  </div>
} @else {
  <!-- Centered Login Layout -->
  <div class="min-h-screen w-full flex items-center justify-center p-4 bg-[#090d16] font-sans">
    <div class="bg-slate-950/70 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-6 md:p-8 transition-all duration-500 w-full max-w-md animate-fadeIn">
      <app-login 
        [loading]="loading()" 
        [error]="error()" 
        [initialToken]="token()"
        (tokenConnected)="onTokenConnected($event)"
        (redirectToGoogleRequested)="redirectToGoogle()"
      ></app-login>
    </div>
  </div>
}
