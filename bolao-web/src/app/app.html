@if (user()) {
  <!-- Full Screen Premium Dashboard Layout in Column -->
  <div class="h-screen w-full flex flex-col bg-[#090d16] text-slate-100 font-sans overflow-hidden animate-fadeIn">
    
    <!-- Top Countdown Banner Component -->
    <app-countdown-banner></app-countdown-banner>

    <!-- Content Area below Banner -->
    <div class="flex flex-1 overflow-hidden">
      <!-- Left Sidebar Component -->
      <app-sidebar 
        [user]="user()" 
        (logoutRequested)="logout()"
      ></app-sidebar>

      <!-- Main Content Pane -->
      <main class="flex-1 overflow-y-auto p-8 bg-[#090d16] flex flex-col">
        <!-- Dynamic Pages wrapper -->
        <div class="max-w-6xl w-full mx-auto">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>

  <app-profile-completion-modal
    [open]="isProfileIncomplete()"
    [loading]="completeProfileLoading()"
    [error]="completeProfileError()"
    [name]="completeProfileName()"
    [project]="completeProfileProject()"
    [seniority]="completeProfileSeniority()"
    (nameChange)="completeProfileName.set($event)"
    (projectChange)="completeProfileProject.set($event)"
    (seniorityChange)="completeProfileSeniority.set($event)"
    (save)="submitProfileUpdate()"
    (logout)="logout()"
  ></app-profile-completion-modal>
} @else {
  <!-- Centered Login Layout -->
  <div class="min-h-screen w-full flex items-center justify-center p-4 bg-[#090d16] font-sans">
    <div class="bg-slate-950/70 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-6 md:p-8 transition-all duration-500 w-full max-w-md animate-fadeIn">
      <app-login 
        [loading]="loading()" 
        [error]="error()" 
        [initialToken]="token()"
        (tokenConnected)="onTokenConnected($event)"
        (redirectToGoogleRequested)="redirectToGoogle()"
      ></app-login>
    </div>
  </div>
}
